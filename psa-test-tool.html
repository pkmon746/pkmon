<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 PSA 프록시 서버 테스트</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }

        h1 {
            color: #A855F7;
        }

        .test-box {
            background: rgba(124, 58, 237, 0.1);
            border: 2px solid #7C3AED;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        button {
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            max-height: 400px;
            overflow-y: auto;
        }

        .success {
            color: #10B981;
        }

        .error {
            color: #EF4444;
        }

        .warning {
            color: #F59E0B;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: 1px solid #7C3AED;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h1>🔧 PSA 프록시 서버 진단 도구</h1>

    <div class="test-box">
        <h2>Step 1: 서버 상태 확인</h2>
        <button onclick="checkHealth()">서버 Health Check</button>
        <div id="healthResult" class="result"></div>
    </div>

    <div class="test-box">
        <h2>Step 2: PSA API 테스트</h2>
        <input type="text" id="certInput" placeholder="PSA CERT 번호 입력" value="12345678">
        <button onclick="testPSA()">PSA API 호출</button>
        <div id="psaResult" class="result"></div>
    </div>

    <div class="test-box">
        <h2>Step 3: agents.js 파일 확인</h2>
        <button onclick="checkAgentFile()">agents.js 캐시 확인</button>
        <div id="fileResult" class="result"></div>
    </div>

    <div class="test-box">
        <h2>Step 4: 강력 새로고침 가이드</h2>
        <p class="warning">브라우저가 이전 버전의 agents.js를 캐시하고 있을 수 있습니다.</p>
        <ul>
            <li><strong>Windows/Linux:</strong> Ctrl + Shift + R</li>
            <li><strong>Mac:</strong> Cmd + Shift + R</li>
            <li>또는 개발자 도구(F12) → Network 탭 → "Disable cache" 체크</li>
        </ul>
        <button onclick="window.location.reload(true)">강력 새로고침 실행</button>
    </div>

    <script>
        async function checkHealth() {
            const resultDiv = document.getElementById('healthResult');
            resultDiv.innerHTML = '⏳ 서버 상태 확인 중...';

            try {
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();

                if (data.status === 'ok') {
                    resultDiv.innerHTML = `<span class="success">✅ 성공!</span>\n\n${JSON.stringify(data, null, 2)}\n\n서버가 정상적으로 실행 중입니다!`;
                } else {
                    resultDiv.innerHTML = `<span class="warning">⚠️ 예상치 못한 응답</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 실패</span>\n\n에러: ${error.message}\n\n프록시 서버가 실행 중이 아닙니다.\n터미널에서 'npm start'를 실행하세요.`;
            }
        }

        async function testPSA() {
            const certNumber = document.getElementById('certInput').value;
            const resultDiv = document.getElementById('psaResult');
            resultDiv.innerHTML = `⏳ PSA CERT ${certNumber} 조회 중...`;

            try {
                const response = await fetch(`http://localhost:3000/api/psa/cert/${certNumber}`);
                const text = await response.text();

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = text;
                }

                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">✅ PSA API 호출 성공!</span>\n\nStatus: ${response.status}\n\nData:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ PSA API 에러</span>\n\nStatus: ${response.status}\n\nResponse:\n${JSON.stringify(data, null, 2)}\n\n이 CERT 번호가 유효한지 확인하세요.`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 실패</span>\n\n에러: ${error.message}\n\n프록시 서버가 실행 중인지 확인하세요.`;
            }
        }

        async function checkAgentFile() {
            const resultDiv = document.getElementById('fileResult');
            resultDiv.innerHTML = '⏳ agents.js 파일 확인 중...';

            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`assets/agents.js?t=${timestamp}`);
                const content = await response.text();

                // Check if the file contains the proxy endpoint
                if (content.includes('http://localhost:3000/api/psa/cert/')) {
                    resultDiv.innerHTML = `<span class="success">✅ agents.js가 최신 버전입니다!</span>\n\n프록시 엔드포인트 발견: localhost:3000\n\n파일 크기: ${content.length} bytes\n수정 시간: ${new Date().toLocaleString('ko-KR')}`;
                } else if (content.includes('Bearer')) {
                    resultDiv.innerHTML = `<span class="error">❌ 브라우저가 이전 버전을 캐시하고 있습니다!</span>\n\n여전히 이전 API 엔드포인트를 사용 중입니다.\n\n해결 방법:\n1. Ctrl + Shift + R (강력 새로고침)\n2. 브라우저 캐시 완전 삭제\n3. 시크릿 모드로 열기`;
                } else {
                    resultDiv.innerHTML = `<span class="warning">⚠️ 파일 확인 필요</span>\n\n프록시 엔드포인트를 찾을 수 없습니다.\n파일이 올바르게 수정되었는지 확인하세요.`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 실패</span>\n\n에러: ${error.message}`;
            }
        }

        // 자동으로 health check 실행
        window.addEventListener('load', () => {
            setTimeout(checkHealth, 500);
        });
    </script>
</body>

</html>
