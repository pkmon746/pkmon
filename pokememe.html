    <script>
        // Configuration
        const CONFIG = {
            refreshInterval: 15000, // 15 seconds
            coins: [
                'A9E2AopuG56LWYiXsvGLLTcLjUjQ539PY6k5Fhfepump', // Solana 1
                'CARDSccUMFKoPRZxt5vt3ksUbxEFEcnZ3H2pd3dKxYjp', // Solana 2
                '0xE09fB60E8D6e7E1CEbBE821bD5c3FC67a40F86bF'   // Ethereum
            ]
        };

        const container = document.getElementById('coin-grid');

        // Helper: Format Currency
        const formatCurrency = (value) => {
            if (!value) return '$0.00';
            if (value < 0.0001) return '$' + parseFloat(value).toExponential(2);
            if (value < 1) return '$' + parseFloat(value).toFixed(8);
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
        };

        // Helper: Format Number (M/K)
        const formatNumber = (num) => {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toLocaleString();
        };

        // Main Fetch Function
        async function fetchMarketData() {
            try {
                // Fetch data for all tokens in one request or separate requests? DexScreener supports comma-separated?
                // DexScreener API: https://api.dexscreener.com/latest/dex/tokens/{tokenAddreses} 
                // It supports multiple addresses comma separated.
                const addresses = CONFIG.coins.join(',');
                const response = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${addresses}`);
                const data = await response.json();

                if (!data.pairs || data.pairs.length === 0) {
                    console.error("No pair data found");
                    return;
                }

                // Process Data:
                // 1. Group pairs by baseToken.address to handle multiple pairs for same token
                // 2. Select the "best" pair (highest liquidity) for each unique token address in our list
                const bestPairs = [];
                const processedTokens = new Set();

                // Sort raw pairs by liquidity USD desc to prioritize main pools
                const sortedRawPairs = data.pairs.sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0));

                for (const pair of sortedRawPairs) {
                    // Check if this pair's base token is in our target list
                    const tokenAddress = pair.baseToken.address;
                    // Note: API might return slightly different casing, normalize to lowercase
                    const targetSet = new Set(CONFIG.coins.map(c => c.toLowerCase()));

                    if (targetSet.has(tokenAddress.toLowerCase()) && !processedTokens.has(tokenAddress.toLowerCase())) {
                        bestPairs.push(pair);
                        processedTokens.add(tokenAddress.toLowerCase());
                    }
                }

                // Sorting Logic: Sort by 24h Price Change Descending
                bestPairs.sort((a, b) => (b.priceChange?.h24 || 0) - (a.priceChange?.h24 || 0));

                renderCards(bestPairs);

            } catch (error) {
                console.error("Failed to fetch market data:", error);
            }
        }

        function renderCards(pairs) {
            container.innerHTML = ''; // Clear current content (simple re-render for now)

            pairs.forEach((pair, index) => {
                const isPositive = pair.priceChange?.h24 >= 0;
                const changeColor = isPositive ? 'text-accent-green' : 'text-accent-red';
                const changeIcon = isPositive ? 'fa-arrow-up' : 'fa-arrow-down';
                const progressColor = isPositive ? 'bg-accent-green' : 'bg-accent-red';

                // Volume & Txns
                const vol24h = pair.volume?.h24 || 0;
                const liquidityAmt = pair.liquidity?.usd || 0;
                const fdv = pair.fdv || 0;

                // Buy/Sell Ratio (approx from txns)
                const txns = pair.txns?.h24 || { buys: 0, sells: 0 };
                const totalTxns = (txns.buys || 0) + (txns.sells || 0);
                const buyPercent = totalTxns > 0 ? ((txns.buys / totalTxns) * 100).toFixed(0) : 50;

                const card = document.createElement('div');
                card.className = `glass-panel rounded-2xl p-6 hover:border-primary-purple transition-all duration-300 transform hover:-translate-y-2 card-enter`;
                card.style.animationDelay = `${index * 100}ms`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center overflow-hidden border border-gray-600">
                                ${pair.info?.imageUrl
                        ? `<img src="${pair.info.imageUrl}" alt="${pair.baseToken.symbol}" class="w-full h-full object-cover">`
                        : `<span class="text-xl font-bold">${pair.baseToken.symbol.substring(0, 2)}</span>`
                    }
                            </div>
                            <div>
                                <h3 class="font-bold text-xl leading-tight">${pair.baseToken.name}</h3>
                                <div class="flex items-center gap-2 text-sm text-gray-400">
                                    <span class="font-mono">${pair.baseToken.symbol}</span>
                                    <span class="px-2 py-0.5 rounded textxs bg-gray-800 uppercase border border-gray-700">
                                        ${pair.chainId === 'solana' ? 'SOL' : 'ETH'}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold font-mono tracking-tight">${formatCurrency(pair.priceUsd)}</div>
                            <div class="font-medium ${changeColor} flex items-center justify-end gap-1">
                                <i class="fas ${changeIcon} text-xs"></i>
                                ${Math.abs(pair.priceChange?.h24).toFixed(2)}%
                            </div>
                        </div>
                    </div>

                    <!-- Stats Grid -->
                    <div class="grid grid-cols-3 gap-4 mb-6 text-center bg-gray-900/50 rounded-lg p-3 border border-gray-800">
                        <div>
                            <div class="text-xs text-gray-500 uppercase mb-1">Market Cap</div>
                            <div class="font-semibold text-sm">${formatNumber(fdv)}</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 uppercase mb-1">Volume (24h)</div>
                            <div class="font-semibold text-sm">${formatNumber(vol24h)}</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 uppercase mb-1">Liquidity</div>
                            <div class="font-semibold text-sm">${formatNumber(liquidityAmt)}</div>
                        </div>
                    </div>

                    <!-- Buy/Sell Pressure -->
                    <div class="mb-2">
                        <div class="flex justify-between text-xs text-gray-400 mb-1">
                            <span>Buys: ${txns.buys}</span>
                            <span>Sells: ${txns.sells}</span>
                        </div>
                        <div class="h-2 bg-gray-800 rounded-full overflow-hidden flex">
                            <div style="width: ${buyPercent}%" class="h-full bg-accent-green"></div>
                            <div style="width: ${100 - buyPercent}%" class="h-full bg-accent-red"></div>
                        </div>
                    </div>
                    
                    <a href="${pair.url}" target="_blank" class="block w-full text-center py-3 rounded-xl bg-primary-purple/20 hover:bg-primary-purple/40 text-primary-purple font-semibold transition-colors mt-4 border border-transparent hover:border-primary-purple">
                        View on DexScreener <i class="fas fa-external-link-alt ml-1 text-sm"></i>
                    </a>
                `;

                container.appendChild(card);
            });
        }

        // Initial Fetch
        fetchMarketData();

        // Auto Refresh
        setInterval(fetchMarketData, CONFIG.refreshInterval);

    </script>

    <script>
    async function _runDashboardGate() {
        var BACKEND    = 'https://pkmon-payment-backend-api.onrender.com/api';
        var TOKEN_ADDR = '0x340eC38B76eF2074bfFC028c490941b8e34f9eb0';
        var RECEIVER   = '0xdF286dC4f9bB608f05369Dcd9B105dA94107b5C9';
        var AMOUNT     = 500000;
        var ERC20_ABI  = [
            'function decimals() view returns (uint8)',
            'function balanceOf(address) view returns (uint256)',
            'function transfer(address to, uint256 amount) returns (bool)'
        ];

        function toast(msg) {
            var old = document.getElementById('_gateToast');
            if (old) old.remove();
            var el = document.createElement('div');
            el.id = '_gateToast';
            el.style.cssText = 'position:fixed;top:80px;right:20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid rgba(239,68,68,0.5);border-radius:14px;padding:16px 20px;color:#fff;font-size:14px;font-weight:600;z-index:99999;max-width:320px;line-height:1.6;box-shadow:0 8px 30px rgba(0,0,0,0.4);';
            el.innerHTML = msg;
            if (!document.getElementById('_toastStyle')) {
                var s = document.createElement('style');
                s.id = '_toastStyle';
                s.textContent = '@keyframes _tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}';
                document.head.appendChild(s);
            }
            document.body.appendChild(el);
            setTimeout(function(){ var t=document.getElementById('_gateToast'); if(t)t.remove(); }, 4000);
        }

        function pulseWallet() {
            var btn = document.getElementById('connectWalletBtn');
            if (!btn) return;
            btn.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.6)';
            btn.style.transform = 'scale(1.05)';
            setTimeout(function(){ btn.style.boxShadow=''; btn.style.transform=''; }, 1500);
        }

        function showSpinner() {
            var old = document.getElementById('_gateSpinner'); if (old) old.remove();
            var el = document.createElement('div'); el.id = '_gateSpinner';
            el.innerHTML = '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99998;display:flex;justify-content:center;align-items:center;"><div style="text-align:center;"><div style="width:56px;height:56px;border:4px solid rgba(124,58,237,0.2);border-top:4px solid #7c3aed;border-radius:50%;margin:0 auto 16px;animation:_spin 1s linear infinite;"></div><p style="color:#fff;font-size:15px;font-weight:600;margin:0;">Verifying payment...</p></div></div><style>@keyframes _spin{to{transform:rotate(360deg)}}</style>';
            document.body.appendChild(el);
        }
        function hideSpinner() { var s=document.getElementById('_gateSpinner'); if(s)s.remove(); }

        // 1. 로그아웃 체크
        if (sessionStorage.getItem('rlo_user_logged_out') === 'true') {
            toast('&#x1F512; Please connect your wallet first!<br>Click "Connect Wallet" button.');
            pulseWallet();
            return;
        }

        // 2. 지갑 연결 체크
        var account = window.walletConnector && window.walletConnector.currentAccount;
        if (!account) {
            toast('&#x1F512; Please connect your wallet first!<br>Click "Connect Wallet" button.');
            pulseWallet();
            return;
        }

        showSpinner();

        try {
            // 3. 백엔드 결제 이력 확인
            var hasPaid = false;
            try {
                var res = await fetch(BACKEND + '/check-payment/' + account.toLowerCase());
                if (res.ok) { var d = await res.json(); hasPaid = d.hasPaid; }
            } catch(e) {
                try {
                    var local = JSON.parse(localStorage.getItem('rlo_paid_users') || '[]');
                    hasPaid = local.indexOf(account.toLowerCase()) !== -1;
                } catch(e2) {}
            }

            if (hasPaid) {
                hideSpinner();
                window.location.href = 'agent-dashboard.html';
                return;
            }

            // 4. ethers 확인
            if (typeof window.ethers === 'undefined') {
                hideSpinner();
                toast('&#x26A0; Wallet library not loaded. Please refresh (F5).');
                return;
            }

            // 5. RLO 잔액 확인
            var provider = new window.ethers.providers.Web3Provider(window.ethereum);
            var contract = new window.ethers.Contract(TOKEN_ADDR, ERC20_ABI, provider);
            var decimals = await contract.decimals();
            var raw = await contract.balanceOf(account);
            var balance = parseFloat(window.ethers.utils.formatUnits(raw, decimals));

            hideSpinner();

            if (balance < AMOUNT) {
                _showInsufficientModal(balance, AMOUNT);
            } else {
                _showPaymentModal(balance, account, AMOUNT, TOKEN_ADDR, RECEIVER, BACKEND);
            }

        } catch(err) {
            hideSpinner();
            console.error('[Gate]', err);
            toast('&#x26A0; An error occurred. Please try again.');
        }
    }

    function _showInsufficientModal(balance, required) {
        var old = document.getElementById('_insuffModal'); if (old) old.remove();
        var el = document.createElement('div'); el.id = '_insuffModal';
        var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;justify-content:center;align-items:center;">'
            + '<div style="background:linear-gradient(135deg,#0f1729,#1a2744);border-radius:20px;padding:2.5rem 2rem;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(239,68,68,0.3);">'
            + '<div style="width:88px;height:88px;border-radius:50%;overflow:hidden;margin:0 auto 1.5rem;border:3px solid rgba(239,68,68,0.4);">'
            + '<img src="assets/pikachu-buy.jpg" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\'">'
            + '</div>'
            + '<div style="font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:1rem;">Insufficient RLO Balance</div>'
            + '<div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:1rem;margin-bottom:1.5rem;">'
            + '<div style="color:#94a3b8;font-size:0.85rem;margin-bottom:4px;">Current Balance:</div>'
            + '<div style="color:#fbbf24;font-weight:700;font-size:1.1rem;">' + balance.toLocaleString() + ' RLO</div>'
            + '<div style="color:#94a3b8;font-size:0.85rem;margin:8px 0 4px;">Required Amount:</div>'
            + '<div style="color:#fff;font-weight:700;font-size:1.1rem;">' + required.toLocaleString() + ' RLO</div>'
            + '</div>'
            + '<div style="background:rgba(16,185,129,0.08);border-radius:10px;padding:12px;margin-bottom:1.5rem;text-align:left;">'
            + '<div style="color:#10B981;font-size:0.85rem;font-weight:600;margin-bottom:6px;">&#x1F6D2; How to buy RLO:</div>'
            + '<div style="color:#94a3b8;font-size:0.82rem;line-height:1.7;">1. Purchase on DEX (Decentralized Exchange)<br>2. Buy on official website</div>'
            + '</div>'
            + '<div style="display:flex;gap:10px;">'
            + '<button id="_insuffClose" style="flex:1;padding:12px;background:rgba(255,255,255,0.08);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">&#x2715; Close</button>'
            + '<button id="_buyBtn" style="flex:2;padding:12px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;">&#x1F6D2; Buy RLO</button>'
            + '</div></div></div>';
        el.innerHTML = html;
        document.body.appendChild(el);
        document.getElementById('_insuffClose').onclick = function(){ el.remove(); };
        document.getElementById('_buyBtn').onclick = function(){ window.open('https://www.renaiss.xyz/','_blank'); };
    }

    function _showPaymentModal(balance, account, amount, tokenAddr, receiver, backend) {
        var old = document.getElementById('_payModal'); if (old) old.remove();
        var el = document.createElement('div'); el.id = '_payModal';
        var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;justify-content:center;align-items:center;">'
            + '<div style="background:linear-gradient(135deg,#0f1729,#1a2744);border-radius:20px;padding:2.5rem 2rem;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid rgba(124,58,237,0.3);">'
            + '<div style="width:64px;height:64px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.8rem;">&#x1F510;</div>'
            + '<div style="font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:0.5rem;">One-Time Access Payment</div>'
            + '<div style="color:#94a3b8;font-size:0.9rem;margin-bottom:1.5rem;">Pay once, access forever</div>'
            + '<div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:1rem;margin-bottom:1.5rem;">'
            + '<div style="color:#94a3b8;font-size:0.82rem;margin-bottom:4px;">Payment Amount</div>'
            + '<div style="color:#fff;font-weight:800;font-size:1.4rem;">' + amount.toLocaleString() + ' RLO</div>'
            + '<div style="color:#94a3b8;font-size:0.75rem;margin-top:6px;">Your balance: ' + balance.toLocaleString() + ' RLO</div>'
            + '</div>'
            + '<div style="display:flex;gap:10px;">'
            + '<button id="_payCancel" style="flex:1;padding:12px;background:rgba(255,255,255,0.08);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">&#x2715; Cancel</button>'
            + '<button id="_payBtn" style="flex:2;padding:12px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;">&#x1F4B3; Pay &amp; Enter</button>'
            + '</div></div></div>';
        el.innerHTML = html;
        document.body.appendChild(el);

        document.getElementById('_payCancel').onclick = function(){ el.remove(); };
        document.getElementById('_payBtn').addEventListener('click', async function() {
            var btn = document.getElementById('_payBtn');
            btn.textContent = 'Processing...'; btn.disabled = true;
            try {
                if (window.walletConnector && window.walletConnector.switchToSepolia) {
                    await window.walletConnector.switchToSepolia();
                }
                var p2 = new window.ethers.providers.Web3Provider(window.ethereum);
                var signer = p2.getSigner();
                var erc20 = new window.ethers.Contract(tokenAddr, [
                    'function decimals() view returns (uint8)',
                    'function transfer(address,uint256) returns (bool)'
                ], signer);
                var dec = await erc20.decimals();
                var wei = window.ethers.utils.parseUnits(amount.toString(), dec);
                var tx = await erc20.transfer(receiver, wei);
                btn.textContent = 'Confirming...';
                await tx.wait();
                try {
                    await fetch(backend + '/record-payment', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({address: account, txHash: tx.hash, amount: amount, timestamp: Date.now()})
                    });
                } catch(e) {}
                try {
                    var paid = JSON.parse(localStorage.getItem('rlo_paid_users') || '[]');
                    if (paid.indexOf(account.toLowerCase()) === -1) {
                        paid.push(account.toLowerCase());
                        localStorage.setItem('rlo_paid_users', JSON.stringify(paid));
                    }
                } catch(e) {}
                var modal = document.getElementById('_payModal'); if (modal) modal.remove();
                setTimeout(function(){ window.location.href = 'agent-dashboard.html'; }, 500);
            } catch(err) {
                var b = document.getElementById('_payBtn');
                if (b) { b.innerHTML = '&#x1F4B3; Pay &amp; Enter'; b.disabled = false; }
                console.error('[Payment]', err);
                alert('Payment failed: ' + (err.message || 'Unknown error'));
            }
        });
    }
    </script>

</body>
</html>
